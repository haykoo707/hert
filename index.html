<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Հերթ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Armenian:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #383838;
      --surface: #141416;
      --surface2: #1c1c20;
      --border: #2a2a30;
      --accent: #ffffff;
      --accent2: #ffffff;
      --text: #f0ede6;
      --text-muted: #c5c5c5;
      --red: #e05252;
      --green: #52c97a;
      --orange: #f0a040;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 24px 16px;
      position: relative;
      z-index: 1;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes itemIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── AUTH ── */
    #auth {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      animation: slideUp 0.4s cubic-bezier(0.22,1,0.36,1);
    }

    .card-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    #auth h2 {
      font-family: 'Noto Serif Armenian', serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    .input-group { position: relative; margin-bottom: 16px; }
    .input-group label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'Noto Serif Armenian', serif;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder { color: #3a3a42; }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(252,252,252,0.1);
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      transition: all 0.18s ease;
      width: 100%;
    }

    .btn-primary { background: var(--accent); color: #0d0d0f; }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,255,255,0.25); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
    .btn-secondary:active { transform: translateY(0); }

    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-danger:hover { background: rgba(224,82,82,0.1); transform: translateY(-1px); }

    .btn-admin {
      background: transparent;
      color: var(--green);
      border: 1px solid rgba(38, 255, 0, 0.627);
      font-size: 11px;
      padding: 11px 16px;
    }
    
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* ── APP ── */
    #app { animation: slideUp 0.4s cubic-bezier(0.22,1,0.36,1); }

    .welcome-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .welcome-info { display: flex; flex-direction: column; gap: 2px; }
    .welcome-name { font-family: 'Noto Serif Armenian', serif; font-size: 18px; font-weight: 700; color: var(--text); }
    .welcome-role { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }

    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #e1e1e1);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Noto Serif Armenian', serif;
      font-size: 18px; font-weight: 900; color: #0d0d0f;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-title { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-muted); }

    .queue-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--text-muted);
    }

    #queueList { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    #queueList li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
      animation: itemIn 0.3s cubic-bezier(0.22,1,0.36,1);
    }

    #queueList li:first-child {
      border-color: rgba(255,255,255,0.35);
      background: rgba(160,160,160,0.04);
    }

    .item-number {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    #queueList li:first-child .item-number { background: var(--accent); color: #0d0d0f; }

    .item-name { font-family: 'Noto Serif Armenian', serif; font-size: 15px; color: var(--text); flex: 1; }

    .item-crown { font-size: 14px; opacity: 0; transition: opacity 0.2s; }
    #queueList li:first-child .item-crown { opacity: 1; }

    .empty-state {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
    }

    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
    .empty-text { font-size: 12px; color: var(--text-muted); font-family: 'Noto Serif Armenian', serif; }

    .status-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
    .status-text { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    .admin-section { margin-top: 16px; }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 26px;
      width: 100%;
      max-width: 400px;
      animation: slideUp 0.3s cubic-bezier(0.22,1,0.36,1);
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-title {
      font-family: 'Noto Serif Armenian', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      font-family: monospace;
    }

    .modal-close:hover { color: var(--text); background: var(--surface2); }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 20px;
    }

    .admin-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--orange);
    }

    /* ── WORKER ROWS IN ADMIN ── */
    .worker-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

    .worker-row {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: itemIn 0.3s cubic-bezier(0.22,1,0.36,1);
    }

    .worker-row-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .worker-pos {
      width: 24px; height: 24px;
      border-radius: 5px;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .worker-name-label {
      font-family: 'Noto Serif Armenian', serif;
      font-size: 14px;
      color: var(--text);
      flex: 1;
    }

    .worker-remove-btn {
      background: transparent;
      border: 1px solid rgba(224,82,82,0.35);
      color: var(--red);
      border-radius: 6px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      padding: 4px 10px;
      letter-spacing: 0.05em;
      transition: all 0.18s;
    }

    .worker-remove-btn:hover { background: rgba(224,82,82,0.12); border-color: var(--red); }

    /* ── TIMING LOG ── */
    .timing-log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.8;
      letter-spacing: 0.04em;
    }

    .timing-log .log-entry { display: flex; justify-content: space-between; gap: 8px; }
    .timing-log .log-join { color: var(--green); }
    .timing-log .log-next { color: var(--orange); }
    .timing-log .log-gap { color: #a0a0b0; font-style: italic; }

    .no-logs {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'Noto Serif Armenian', serif;
      text-align: center;
      padding: 8px 0;
      opacity: 0.6;
    }

    .admin-section-title {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      margin-top: 16px;
    }

    .admin-section-title:first-of-type { margin-top: 0; }

    .empty-workers {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'Noto Serif Armenian', serif;
      text-align: center;
      padding: 16px;
      opacity: 0.6;
    }

    /* ── CUSTOM POPUP (replaces alert / confirm) ── */
    #popupOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #popupOverlay.open { display: flex; }

    #popupBox {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 26px 22px;
      width: 100%;
      max-width: 340px;
      animation: popIn 0.28s cubic-bezier(0.22,1,0.36,1);
      text-align: center;
    }

    #popupIcon {
      font-size: 28px;
      margin-bottom: 14px;
      display: block;
    }

    #popupTitle {
      font-family: 'Noto Serif Armenian', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    #popupMsg {
      font-family: 'Noto Serif Armenian', serif;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 22px;
    }

    #popupActions {
      display: flex;
      gap: 10px;
    }

    #popupActions .btn {
      flex: 1;
      padding: 12px 16px;
      font-size: 11px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- AUTH -->
  <div id="auth">
    <p class="card-label">Աշխատակցի մուտք</p>
    <h2>Բարի գալուստ</h2>
    <div class="input-group">
      <label>Քո անունը</label>
      <input id="nameInput" type="text" placeholder="">
    </div>
    <button class="btn btn-primary" onclick="login()">Մտնել →</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">

    <div class="welcome-bar">
      <div class="welcome-info">
        <span class="welcome-name" id="welcome"></span>
        <span class="welcome-role">Հավաքագրող</span>
      </div>
      <div class="avatar" id="avatarEl"></div>
    </div>

    <div class="status-strip">
      <span class="status-dot"></span>
      <span class="status-text">Connected to server</span>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" onclick="joinQueue()">+ Հերթ</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextOrder()" disabled>Հաջորդ ➜</button>
    </div>

    <div class="divider"></div>

    <div class="section-header">
      <span class="section-title">Հերթականություն</span>
      <span class="queue-count" id="queueCount">0 հոգի</span>
    </div>

    <ul id="queueList"></ul>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🛒</div>
      <p class="empty-text">դատարկ է</p>
    </div>

    <div class="admin-section">
      <div class="divider"></div>
      <button class="btn btn-admin" onclick="openAdminLogin()">⚙ Ադմինի մուտք</button>
    </div>

  </div>
</div>

<!-- ═══════════ ADMIN LOGIN MODAL ═══════════ -->
<div class="modal-overlay" id="adminLoginModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Admin</span>
      <button class="modal-close" onclick="closeAdminLogin()">✕</button>
    </div>
    <p class="card-label">Ադմինի մուտք</p>
    <div class="input-group">
      <label>Օգտատեր</label>
      <input id="adminUser" type="text" placeholder="admin">
    </div>
    <div class="input-group">
      <label>Գաղտնաբառ</label>
      <input id="adminPass" type="password" placeholder="••••••">
    </div>
    <div id="adminLoginErr" style="color:var(--red);font-size:11px;margin-bottom:12px;display:none;">Սխալ մուտքագրում</div>
    <button class="btn btn-primary" onclick="doAdminLogin()">Մտնել →</button>
  </div>
</div>

<!-- ═══════════ ADMIN PANEL MODAL ═══════════ -->
<div class="modal-overlay" id="adminPanelModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title"> Panel</span>
      <button class="modal-close" onclick="closeAdminPanel()">✕</button>
    </div>
    <div class="admin-badge">Admin Access</div>

    <p class="admin-section-title">Հերթ — Կառավարում</p>
    <div class="worker-list" id="adminQueueList">
      <div class="empty-workers">Հերթը դատարկ է</div>
    </div>

    <p class="admin-section-title">Ժամանակի Գրանցում</p>
    <div class="timing-log" id="timingLog">
      <div class="no-logs">Տվյալ չկա</div>
    </div>
  </div>
</div>

<!-- ═══════════ CUSTOM POPUP ═══════════ -->
<div id="popupOverlay">
  <div id="popupBox">
    <span id="popupIcon"></span>
    <div id="popupTitle"></div>
    <div id="popupMsg"></div>
    <div id="popupActions"></div>
  </div>
</div>

<script src="https://hert-backend-y1hg.onrender.com/socket.io/socket.io.js"></script>
<script>
// ─── CONFIG ───
const ADMIN_USER = "admin";
const ADMIN_PASS = "admin123";

// ─── STATE ───
const socket = io("https://hert-backend-y1hg.onrender.com");
let user = localStorage.getItem("user");
let currentWorker = null;
let currentQueue = [];
let timingData = {};

if (user) showApp();

// ─── CUSTOM POPUP ───
// showPopup({ icon, title, msg, buttons: [{label, style, onClick}] })
function showPopup({ icon = "", title = "", msg = "", buttons = [] }) {
  document.getElementById("popupIcon").textContent = icon;
  document.getElementById("popupTitle").textContent = title;
  document.getElementById("popupMsg").textContent = msg;

  const actionsEl = document.getElementById("popupActions");
  actionsEl.innerHTML = "";

  buttons.forEach(b => {
    const btn = document.createElement("button");
    btn.className = "btn " + (b.style || "btn-secondary");
    btn.textContent = b.label;
    btn.onclick = () => {
      closePopup();
      if (b.onClick) b.onClick();
    };
    actionsEl.appendChild(btn);
  });

  document.getElementById("popupOverlay").classList.add("open");
}

function closePopup() {
  document.getElementById("popupOverlay").classList.remove("open");
}

// Close popup on overlay click
document.getElementById("popupOverlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closePopup();
});

// Replaces alert()
function showAlert(msg, icon = "ℹ️", title = "Ծանուցում") {
  showPopup({
    icon,
    title,
    msg,
    buttons: [{ label: "Լավ", style: "btn-primary", onClick: null }]
  });
}

// Replaces confirm()
function showConfirm(msg, title, icon, onConfirm) {
  showPopup({
    icon,
    title,
    msg,
    buttons: [
      { label: "Չեղարկել", style: "btn-secondary", onClick: null },
      { label: "Հաստատել", style: "btn-danger", onClick: onConfirm }
    ]
  });
}

// ─── AUTH ───
function login() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return;
  localStorage.setItem("user", name);
  user = name;
  showApp();
}

function showApp() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = user;
  document.getElementById("avatarEl").innerText = user.charAt(0).toUpperCase();
}

// ─── SOCKET EVENTS ───
socket.on("queue", (data) => {
  currentQueue = data;
  renderQueue(data);
  if (document.getElementById("adminPanelModal").classList.contains("open")) {
    renderAdminQueue(data);
  }
});

socket.on("currentWorker", (worker) => {
  currentWorker = worker;
  document.getElementById("nextBtn").disabled = (worker !== user);
});

socket.on("timingData", (data) => {
  timingData = data;
  if (document.getElementById("adminPanelModal").classList.contains("open")) {
    renderTimingLog();
  }
});

socket.on("order", (worker) => {
  showAlert("Պատվեր գնաց → " + worker, "✅", "");
});

socket.on("errorMsg", (msg) => {
  showAlert(msg, "❌", "Սխալ");
});

// ─── QUEUE ACTIONS ───
function joinQueue() {
  socket.emit("joinQueue", user);
}

function nextOrder() {
  socket.emit("nextOrder", user);
}

// ─── RENDER QUEUE ───
function renderQueue(data) {
  const list = document.getElementById("queueList");
  const empty = document.getElementById("emptyState");
  const count = document.getElementById("queueCount");

  list.innerHTML = "";
  count.textContent = data.length + " հոգի";

  if (data.length === 0) { empty.style.display = "block"; return; }
  empty.style.display = "none";

  data.forEach((name, i) => {
    const li = document.createElement("li");
    li.innerHTML = `
      <div class="item-number">${i + 1}</div>
      <span class="item-name">${name}</span>
      <span class="item-crown">★</span>
    `;
    list.appendChild(li);
  });
}

// ─── ADMIN LOGIN ───
function openAdminLogin() {
  document.getElementById("adminLoginErr").style.display = "none";
  document.getElementById("adminUser").value = "";
  document.getElementById("adminPass").value = "";
  document.getElementById("adminLoginModal").classList.add("open");
}

function closeAdminLogin() {
  document.getElementById("adminLoginModal").classList.remove("open");
}

function doAdminLogin() {
  const u = document.getElementById("adminUser").value.trim();
  const p = document.getElementById("adminPass").value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    closeAdminLogin();
    openAdminPanel();
  } else {
    document.getElementById("adminLoginErr").style.display = "block";
  }
}

// ─── ADMIN PANEL ───
function openAdminPanel() {
  document.getElementById("adminPanelModal").classList.add("open");
  renderAdminQueue(currentQueue);
  socket.emit("adminGetTiming", { adminUser: ADMIN_USER, adminPass: ADMIN_PASS });
  renderTimingLog();
}

function closeAdminPanel() {
  document.getElementById("adminPanelModal").classList.remove("open");
}

function renderAdminQueue(data) {
  const container = document.getElementById("adminQueueList");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = '<div class="empty-workers">Հերթը դատարկ է</div>';
    return;
  }

  data.forEach((name, i) => {
    const row = document.createElement("div");
    row.className = "worker-row";
    row.innerHTML = `
      <div class="worker-row-top">
        <div class="worker-pos">${i + 1}</div>
        <span class="worker-name-label">${name}</span>
        <button class="worker-remove-btn" onclick="adminRemove('${name}')">Հանել ✕</button>
      </div>
    `;
    container.appendChild(row);
  });
}

function adminRemove(name) {
  showConfirm(
    `«${name}»-ին հեռացնել հերթից։`,
    "",
    "⚠️",
    () => {
      socket.emit("adminRemove", { worker: name, adminUser: ADMIN_USER, adminPass: ADMIN_PASS });
    }
  );
}

// ─── TIMING LOG ───
function renderTimingLog() {
  const container = document.getElementById("timingLog");

  const workers = Object.keys(timingData);
  if (workers.length === 0) {
    container.innerHTML = '<div class="no-logs">Տվյալ չկա</div>';
    return;
  }

  let html = "";
  workers.forEach(name => {
    const d = timingData[name];
    const joinStr = d.joinTime ? formatTime(d.joinTime) : "—";
    const nextStr = d.nextTime ? formatTime(d.nextTime) : "—";
    const gapStr = (d.joinTime && d.nextTime) ? calcGap(d.joinTime, d.nextTime) : "—";

    html += `<div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);">`;
    html += `<div style="font-family:'Noto Serif Armenian',serif;font-size:13px;color:var(--text);margin-bottom:6px;">${name}</div>`;
    html += `<div class="log-entry"><span class="log-join">▲ Հերթ</span><span>${joinStr}</span></div>`;
    html += `<div class="log-entry"><span class="log-next">▶ Հաջորդ</span><span>${nextStr}</span></div>`;
    html += `<div class="log-entry"><span class="log-gap">⏱ Տևողություն</span><span>${gapStr}</span></div>`;
    html += `</div>`;
  });

  container.innerHTML = html;
}

function formatTime(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, "0");
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function calcGap(t1, t2) {
  const ms = Math.abs(new Date(t2) - new Date(t1));
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  if (min === 0) return `${sec}վ`;
  return `${min}ր ${sec}վ`;
}

// ─── KEYBOARD SUPPORT ───
document.getElementById("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
document.getElementById("adminPass").addEventListener("keydown", e => { if (e.key === "Enter") doAdminLogin(); });

document.getElementById("adminLoginModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeAdminLogin(); });
document.getElementById("adminPanelModal").addEventListener("click", e => { if (e.target === e.currentTarget) closeAdminPanel(); });
</script>
