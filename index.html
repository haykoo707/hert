<!DOCTYPE html>
<html>
<body>

<div id="auth">
  <h2>Մուտք</h2>
  <input id="nameInput" placeholder="Քո անունը">
  <button onclick="login()">Մտնել</button>
</div>

<div id="app" style="display:none;">
  <h2 id="welcome"></h2>

  <button onclick="joinQueue()">Միանալ հերթին</button>
  <button id="nextBtn" onclick="nextOrder()" disabled>Հաջորդ պատվեր</button>

  <ul id="queueList"></ul>
</div>

<script src="https://hert-backend-y1hg.onrender.com/socket.io/socket.io.js"></script>

<script>
const socket = io("https://hert-backend-y1hg.onrender.com");

let user = localStorage.getItem("user");
let currentWorker = null;

// INIT
if (user) showApp();

function login() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return;

  localStorage.setItem("user", name);
  user = name;

  showApp();
}

function showApp() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("welcome").innerText = "Բարև, " + user;
}

// 🔥 QUEUE UPDATE
socket.on("queue", (data) => {
  const list = document.getElementById("queueList");
  list.innerHTML = "";

  data.forEach((name, i) => {
    const li = document.createElement("li");
    li.textContent = (i+1) + ". " + name;
    list.appendChild(li);
  });
});

// 🔥 CURRENT WORKER (IMPORTANT)
socket.on("currentWorker", (worker) => {
  currentWorker = worker;

  const btn = document.getElementById("nextBtn");

  if (worker === user) {
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
});

// 🔥 ORDER ALERT
socket.on("order", (worker) => {
  alert("Պատվերը գնաց → " + worker);
});

// ❌ ERROR
socket.on("errorMsg", (msg) => {
  alert(msg);
});

// JOIN
function joinQueue() {
  socket.emit("joinQueue", user);
}

// 🔥 FIX → ուղարկում ենք անունը
function nextOrder() {
  socket.emit("nextOrder", user);
}
</script>

</body>
</html>
